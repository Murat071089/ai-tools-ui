<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
    <meta name="description" content="Access to the best AI Tools — ChatGPT, Claude, Gemini, and other services in one place">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>AI Tools — Best Neural Networks in One Place</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Fullscreen Splash Overlay -->
    <div class="splash" id="splash">
        <div class="splash__inner">
            <div class="splash__ring">
                <div class="splash__icon">
                    <img src="УБЕРИ_КОРОНЫ._ТАКЖЕ_202604242210.jpeg" alt="AI" class="splash__img">
                </div>
            </div>
            <p class="splash__text">Tap to enter</p>
        </div>
    </div>

    <section class="hero" id="hero">
        <!-- Fullscreen Background Video -->
        <div class="hero-video">
            <video
                class="hero-video__el"
                id="heroVideo"
                muted
                loop
                playsinline
                preload="auto"
                poster="УБЕРИ_КОРОНЫ._ТАКЖЕ_202604242210.jpeg"
            >
                <source src="Robot_awakening_loop_202604242300.mp4" type="video/mp4">
            </video>
            <!-- Dark overlay for text readability -->
            <div class="hero-video__overlay"></div>
        </div>

        <!-- Content layer on top of video -->
        <div class="hero-content">
            <!-- Top zone — Title -->
            <header class="hero__top">
                <h1 class="hero__title">
                    <span class="title-row">Access to the best
                        <span class="robot-badge">
                            <img src="УБЕРИ_КОРОНЫ._ТАКЖЕ_202604242210.jpeg" alt="AI Robot" class="robot-badge__img">
                        </span>
                    </span>
                    <span class="title-row title-row--gold">AI Tools</span>
                </h1>
                <p class="hero__subtitle">ChatGPT, Claude, Gemini, and other<br>services in one place</p>
            </header>

            <!-- Spacer -->
            <div class="hero__center"></div>

            <!-- Slide to unlock CTA -->
            <div class="hero__bottom">
                <div class="slider-btn" id="slider-btn">
                    <div class="slider-btn__thumb" id="slider-thumb">
                        <img src="УБЕРИ_КОРОНЫ._ТАКЖЕ_202604242210.jpeg" alt="AI" class="slider-btn__img">
                    </div>
                    <span class="slider-btn__text">Start for free</span>
                    <div class="slider-btn__shimmer"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Second section — Cards Grid -->
    <section class="section-2" id="section-2">
        <div class="cards-grid">
            <!-- Card 1 — Video (scrubbing) -->
            <div class="card card--video" id="card-video">
                <video class="card__media" muted playsinline preload="auto">
                    <source src="Image to video 丨 A cinematic 6-second video of a futuristic robot being assemble.mp4" type="video/mp4">
                </video>
                <div class="card__overlay">
                    <span class="card__play">▶</span>
                </div>
            </div>
            <!-- Card 2 — placeholder -->
            <div class="card card--empty">
                <div class="card__placeholder">
                    <span class="card__lock">🔒</span>
                    <span class="card__soon">Soon</span>
                </div>
            </div>
            <!-- Card 3 — placeholder -->
            <div class="card card--empty">
                <div class="card__placeholder">
                    <span class="card__lock">🔒</span>
                    <span class="card__soon">Soon</span>
                </div>
            </div>
            <!-- Card 4 — placeholder -->
            <div class="card card--empty">
                <div class="card__placeholder">
                    <span class="card__lock">🔒</span>
                    <span class="card__soon">Soon</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Fullscreen Video Scrub Overlay -->
    <div class="scrub-overlay" id="scrub-overlay">
        <button class="scrub-overlay__close" id="scrub-close">✕</button>
        <canvas class="scrub-overlay__canvas" id="scrub-canvas"></canvas>
        <video class="scrub-overlay__video-src" id="scrub-video" muted playsinline preload="auto" style="display:none;">
            <source src="Image to video 丨 A cinematic 6-second video of a futuristic robot being assemble.mp4" type="video/mp4">
        </video>
        <div class="scrub-overlay__bottom">
            <div class="scrub-slider" id="scrub-slider">
                <div class="scrub-slider__thumb" id="scrub-thumb">
                    <img src="УБЕРИ_КОРОНЫ._ТАКЖЕ_202604242210.jpeg" alt="AI" class="scrub-slider__img">
                </div>
                <span class="scrub-slider__text">Подключить</span>
                <div class="scrub-slider__progress" id="scrub-progress"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
